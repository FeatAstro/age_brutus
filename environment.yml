name: orion-ob1
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - numpy=1.26
  - scipy=1.12
  - astropy=6.0
  - matplotlib=3.8
  - pandas=2.2
  - scikit-learn=1.4   # includes hdbscan via sklearn.cluster
  - hdbscan=0.8.33
  - astroquery=0.4.7
  - pip
  - pip:
    - dynesty>=2.1.0
    - gaiadr3-zeropoint   # Lindegren+2021 parallax ZP
    - dustmaps            # for A(V) priors if needed
    - corner              # posterior corner plots
    # brutus is installed as a submodule — run: pip install -e ./brutus
